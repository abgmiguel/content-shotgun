name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-and-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test:editor-content

      - name: Run workspace contract tests
        run: npm run test:workspace-contract

  rust-tests:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Ensure distDir exists for Tauri config checks
        run: |
          mkdir -p ../dist
          if [ ! -f ../dist/index.html ]; then
            echo '<!doctype html><html><body>CI placeholder</body></html>' > ../dist/index.html
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run cargo tests
        run: cargo test --locked -v
